<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>·</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Syne', system-ui, sans-serif;
      background: #0a0a12;
      color: #fff;
      cursor: default;
    }

    .canvas {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    /* Animated aurora mesh */
    .aurora {
      position: absolute;
      inset: -50%;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(ellipse 80% 60% at 20% 40%, rgba(99, 102, 241, 0.45) 0%, transparent 55%),
        radial-gradient(ellipse 70% 50% at 80% 20%, rgba(139, 92, 246, 0.4) 0%, transparent 50%),
        radial-gradient(ellipse 60% 70% at 60% 80%, rgba(6, 182, 212, 0.35) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 10% 90%, rgba(236, 72, 153, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse 40% 50% at 90% 70%, rgba(245, 158, 11, 0.25) 0%, transparent 45%);
      animation: drift 18s ease-in-out infinite alternate;
      filter: blur(40px);
    }

    @keyframes drift {
      0%   { transform: translate(0, 0) rotate(0deg) scale(1); }
      33%  { transform: translate(3%, -2%) rotate(2deg) scale(1.05); }
      66%  { transform: translate(-2%, 3%) rotate(-1deg) scale(0.98); }
      100% { transform: translate(1%, 1%) rotate(1deg) scale(1.02); }
    }

    /* Floating glass prisms */
    .orb {
      position: absolute;
      border-radius: 50%;
      mix-blend-mode: screen;
      animation: float var(--dur, 12s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }

    .orb--1 {
      width: 320px;
      height: 320px;
      top: 15%;
      left: 10%;
      background: radial-gradient(circle at 30% 30%, rgba(129, 140, 248, 0.6), rgba(99, 102, 241, 0.1) 70%);
      --dur: 14s;
      --delay: 0s;
    }

    .orb--2 {
      width: 240px;
      height: 240px;
      top: 55%;
      right: 15%;
      background: radial-gradient(circle at 40% 40%, rgba(167, 139, 250, 0.55), rgba(139, 92, 246, 0.08) 70%);
      --dur: 11s;
      --delay: -3s;
    }

    .orb--3 {
      width: 180px;
      height: 180px;
      bottom: 20%;
      left: 35%;
      background: radial-gradient(circle at 50% 50%, rgba(34, 211, 238, 0.5), rgba(6, 182, 212, 0.06) 70%);
      --dur: 16s;
      --delay: -7s;
    }

    .orb--4 {
      width: 120px;
      height: 120px;
      top: 25%;
      right: 30%;
      background: radial-gradient(circle at 50% 50%, rgba(251, 113, 133, 0.45), transparent 70%);
      --dur: 9s;
      --delay: -2s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25%       { transform: translate(20px, -30px) scale(1.05); }
      50%       { transform: translate(-15px, 20px) scale(0.95); }
      75%       { transform: translate(25px, 15px) scale(1.02); }
    }

    /* Geometric ring */
    .ring {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(70vmin, 420px);
      height: min(70vmin, 420px);
      transform: translate(-50%, -50%);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 50%;
      animation: spin 40s linear infinite;
    }

    .ring::before,
    .ring::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 50%;
      border: 1px solid transparent;
    }

    .ring::before {
      inset: 12%;
      border-top-color: rgba(129, 140, 248, 0.5);
      border-right-color: rgba(6, 182, 212, 0.3);
      animation: spin 25s linear infinite reverse;
    }

    .ring::after {
      inset: 24%;
      border-bottom-color: rgba(167, 139, 250, 0.4);
      border-left-color: rgba(236, 72, 153, 0.25);
      animation: spin 18s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Center glyph */
    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 2;
      pointer-events: none;
    }

    .glyph {
      font-size: clamp(3rem, 12vw, 6rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      background: linear-gradient(
        135deg,
        #c7d2fe 0%,
        #a5b4fc 25%,
        #67e8f9 50%,
        #c4b5fd 75%,
        #fda4af 100%
      );
      background-size: 200% 200%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 6s ease-in-out infinite;
      filter: drop-shadow(0 0 40px rgba(129, 140, 248, 0.4));
    }

    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50%       { background-position: 100% 50%; }
    }

    /* Film grain */
    .grain {
      position: fixed;
      inset: 0;
      opacity: 0.04;
      pointer-events: none;
      z-index: 10;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
    }

    /* Mouse-reactive spotlight */
    .spotlight {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.06) 0%, transparent 70%);
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 1;
      transition: opacity 0.3s;
    }

    @media (prefers-reduced-motion: reduce) {
      .aurora, .orb, .ring, .ring::before, .ring::after, .glyph {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div class="canvas" aria-hidden="true">
    <div class="aurora"></div>
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="orb orb--3"></div>
    <div class="orb orb--4"></div>
    <div class="ring"></div>
  </div>

  <div class="spotlight" id="spotlight"></div>
  <div class="grain"></div>

  <main class="center">
    <div class="glyph" aria-hidden="true">◈</div>
  </main>

  <script>
    const spot = document.getElementById('spotlight');
  if (window.matchMedia('(prefers-reduced-motion: no-preference)').matches) {
      document.addEventListener('mousemove', (e) => {
        spot.style.left = e.clientX + 'px';
        spot.style.top = e.clientY + 'px';
      });
    } else {
      spot.style.display = 'none';
    }
  </script>
</body>
</html>
